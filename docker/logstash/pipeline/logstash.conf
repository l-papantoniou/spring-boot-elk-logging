# docker/logstash/pipeline/logstash.conf

input {
  file {
    path           => "/var/log/spring/*.log"
    start_position => "beginning"
    sincedb_path   => "/usr/share/logstash/data/sincedb_spring"
    codec          => json {
      target => "[@metadata][raw]"
    }
  }
}

filter {

  # Stage 1 — Lift the parsed JSON back to the event root.
  # The "json" codec on input put everything under [@metadata][raw]
  # so we can cleanly transform it without colliding with Logstash's own fields.
  ruby {
    code => '
      raw = event.get("[@metadata][raw]")
      raw.each { |k, v| event.set(k, v) } if raw.is_a?(Hash)
    '
  }

  # Stage 2 — Set the canonical @timestamp from the application's clock,
  # not from Logstash ingestion time.
  date {
    match  => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Stage 3 — Rename non-ECS fields to their ECS counterparts.
  mutate {
    rename => {
      # Trace / correlation
      "traceId"           => "[trace][id]"
      "correlationId"     => "[labels][correlation_id]"

      # HTTP (request side)
      "http.method"       => "[http][request][method]"
      "http.url"          => "[url][path]"
      "http.query"        => "[url][query]"

      # HTTP (response side)
      "http.status_code"  => "[http][response][status_code]"

      # Client / event metadata (already ECS-shaped, just nest properly)
      "client.ip"         => "[client][ip]"
      "event.kind"        => "[event][kind]"
      "event.category"    => "[event][category]"
      "event.action"      => "[event][action]"
      "event.duration"    => "[event][duration]"
    }
  }

  # Stage 4 — Coerce types Elasticsearch will be happier with.
  mutate {
    convert => {
      "[http][response][status_code]" => "integer"
      "[event][duration]"             => "integer"
    }
  }

  # Stage 5 — Drop noisy fields we don't need indexed.
  mutate {
    remove_field => [
      "[@metadata][raw]",
      "host",         # Logstash adds these — not useful in this context
      "path",
      "@version"      # legacy Logstash field
    ]
  }

  # Stage 6 — Tag errors so dashboards can filter on them cheaply.
  if [log][level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }
}

output {
  elasticsearch {
    hosts          => ["http://elasticsearch:9200"]
    index          => "spring-logs-%{+YYYY.MM.dd}"
    action         => "create"
    # ECS-compliant docs go to a time-based index per day.
    # In production, switch to data streams + ILM (see the next section).
  }

  # Helpful while developing — comment out once your pipeline is stable.
  stdout {
    codec => rubydebug { metadata => false }
  }
}
